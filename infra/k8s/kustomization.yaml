apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: prism-era

resources:
  - namespace.yaml
  - configmap.yaml
  - deployment-web.yaml
  - deployment-api.yaml
  - service.yaml
  - ingress.yaml
  - hpa.yaml

# Common labels applied to all resources
commonLabels:
  app.kubernetes.io/part-of: prism-era
  app.kubernetes.io/managed-by: kustomize

# Images - update tags for deployment
images:
  - name: ghcr.io/prism-era/web
    newTag: latest
  - name: ghcr.io/prism-era/api
    newTag: latest
