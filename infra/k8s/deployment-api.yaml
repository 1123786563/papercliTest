apiVersion: apps/v1
kind: Deployment
metadata:
  name: prism-era-api
  namespace: prism-era
  labels:
    app: prism-era-api
    app.kubernetes.io/name: prism-era-api
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: prism-era-api
  template:
    metadata:
      labels:
        app: prism-era-api
        app.kubernetes.io/name: prism-era-api
    spec:
      containers:
        - name: api
          image: ghcr.io/prism-era/api:latest # Replace with your registry
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
              name: http
          envFrom:
            - configMapRef:
                name: prism-era-config
            - secretRef:
                name: prism-era-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: prism-era-api
                topologyKey: kubernetes.io/hostname
