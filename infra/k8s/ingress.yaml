apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prism-era-ingress
  namespace: prism-era
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - prism-era.com
        - www.prism-era.com
      secretName: prism-era-tls
  rules:
    - host: prism-era.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: prism-era-api
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prism-era-web
                port:
                  number: 80
    - host: www.prism-era.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: prism-era-api
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prism-era-web
                port:
                  number: 80
