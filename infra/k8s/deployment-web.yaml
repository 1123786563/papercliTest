apiVersion: apps/v1
kind: Deployment
metadata:
  name: prism-era-web
  namespace: prism-era
  labels:
    app: prism-era-web
    app.kubernetes.io/name: prism-era-web
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: prism-era-web
  template:
    metadata:
      labels:
        app: prism-era-web
        app.kubernetes.io/name: prism-era-web
    spec:
      containers:
        - name: web
          image: ghcr.io/prism-era/web:latest # Replace with your registry
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: prism-era-config
            - secretRef:
                name: prism-era-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: prism-era-web
                topologyKey: kubernetes.io/hostname