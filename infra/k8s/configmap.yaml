apiVersion: v1
kind: ConfigMap
metadata:
  name: prism-era-config
  namespace: prism-era
data:
  NODE_ENV: "production"
  NEXT_TELEMETRY_DISABLED: "1"
  PORT: "3000"
  API_PORT: "3001"
---
apiVersion: v1
kind: Secret
metadata:
  name: prism-era-secrets
  namespace: prism-era
type: Opaque
stringData:
  # Replace these values in production
  DATABASE_URL: "postgresql://user:password@postgres:5432/prism-era"
  REDIS_URL: "redis://redis:6379"
  # Clerk Auth (replace with actual values)
  NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_xxx"
  CLERK_SECRET_KEY: "sk_test_xxx"
