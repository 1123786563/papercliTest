apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: prism-era-web-hpa
  namespace: prism-era
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: prism-era-web
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: prism-era-api-hpa
  namespace: prism-era
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: prism-era-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
