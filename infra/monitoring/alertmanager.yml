# ============================================
# AlertManager Configuration
# ============================================
# Place in infra/monitoring/alertmanager.yml

global:
  resolve_timeout: 5m
  # Slack configuration (set via environment variables)
  slack_api_url: "${SLACK_WEBHOOK_URL}"

# Inhibition rules
inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal: ["alertname", "namespace"]

# Route tree
route:
  group_by: ["alertname", "namespace", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "default-receiver"
  routes:
    # Critical alerts go to Slack immediately
    - matchers:
        - severity="critical"
      receiver: "slack-critical"
      group_wait: 10s
      repeat_interval: 1h

    # Warning alerts
    - matchers:
        - severity="warning"
      receiver: "slack-warnings"
      group_wait: 5m
      repeat_interval: 4h

    # Info alerts
    - matchers:
        - severity="info"
      receiver: "slack-info"
      group_wait: 30m
      repeat_interval: 24h

# Receivers
receivers:
  - name: "default-receiver"
    slack_configs:
      - channel: "#prism-era-alerts"
        send_resolved: true
        title: "{{ .Status | toUpper }}: {{ .CommonLabels.alertname }}"
        text: >-
          {{ range .Alerts }}
          *Alert:* {{ .Labels.alertname }}
          *Severity:* {{ .Labels.severity }}
          *Description:* {{ .Annotations.description }}
          *Details:*
          {{ range .Labels.SortedPairs }} • *{{ .Name }}:* {{ .Value }}
          {{ end }}
          {{ end }}

  - name: "slack-critical"
    slack_configs:
      - channel: "#prism-era-critical"
        send_resolved: true
        color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'
        title: "🚨 CRITICAL: {{ .CommonLabels.alertname }}"
        text: >-
          {{ range .Alerts }}
          *Description:* {{ .Annotations.description }}
          *Started:* {{ .StartsAt }}
          {{ end }}

  - name: "slack-warnings"
    slack_configs:
      - channel: "#prism-era-alerts"
        send_resolved: true
        color: "warning"
        title: "⚠️ WARNING: {{ .CommonLabels.alertname }}"
        text: "{{ .CommonAnnotations.description }}"

  - name: "slack-info"
    slack_configs:
      - channel: "#prism-era-info"
        send_resolved: true
        color: "good"
        title: "ℹ️ INFO: {{ .CommonLabels.alertname }}"
        text: "{{ .CommonAnnotations.description }}"
