services:
  # ==========================================
  # PostgreSQL Database
  # ==========================================
  postgres:
    image: postgres:16-alpine
    container_name: prism-era-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-prism}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-prism123}
      POSTGRES_DB: ${POSTGRES_DB:-prism-era}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-prism}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Redis Cache (Optional)
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: prism-era-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Next.js Web Application (Development)
  # ==========================================
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    container_name: prism-era-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://${POSTGRES_USER:-prism}:${POSTGRES_PASSWORD:-prism123}@postgres:5432/${POSTGRES_DB:-prism-era}
      - REDIS_URL=redis://redis:6379
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - dev

  # ==========================================
  # Hono API Service (Development)
  # ==========================================
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    container_name: prism-era-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://${POSTGRES_USER:-prism}:${POSTGRES_PASSWORD:-prism123}@postgres:5432/${POSTGRES_DB:-prism-era}
      - REDIS_URL=redis://redis:6379
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - dev

  # ==========================================
  # Production-like Stack
  # ==========================================
  web-prod:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: prism-era-web-prod
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-prism}:${POSTGRES_PASSWORD:-prism123}@postgres:5432/${POSTGRES_DB:-prism-era}
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - prod

  api-prod:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: prism-era-api-prod
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-prism}:${POSTGRES_PASSWORD:-prism123}@postgres:5432/${POSTGRES_DB:-prism-era}
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - prod

# ==========================================
# Volumes
# ==========================================
volumes:
  postgres_data:
  redis_data:

# ==========================================
# Networks
# ==========================================
networks:
  default:
    name: prism-era-network
